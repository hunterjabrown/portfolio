<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Hunter Brown</title>
  <script>
    (function () {
      if (location.pathname === '/projects/') {
        history.replaceState(null, '', '/projects');
      }
    })();
  </script>
  <link rel="icon" type="image/png" href="/assets/HB%20(1).png">
  <meta property="og:title" content="Projects — Hunter Brown">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #dc8535;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: clamp(40px, 8vh, 80px);
      /* Match index.html — same first-line height */
      padding-top: max(clamp(40px, calc(50vh - 200px), 200px), env(safe-area-inset-top, 0px));
      box-sizing: border-box;
    }

    .content {
      max-width: 500px;
      width: min(100%, 500px);
      flex-shrink: 0;
    }

    .projects-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 1.25em;
    }

    .projects-top .projects-label {
      margin-bottom: 0;
    }

    a.home-link {
      font-style: normal;
      color: #8a4820;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    a.home-link:hover {
      color: #dc8535;
    }

    p {
      margin-bottom: 1.1em;
      color: #c87030;
    }

    .name {
      color: #f09040;
      letter-spacing: 0.06em;
    }

    a {
      color: #c87030;
      text-decoration: none;
      font-style: italic;
    }

    a:hover {
      color: #f09040;
    }

    .projects-label {
      color: #8a4820;
      font-family: inherit;
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.02em;
      text-transform: none;
      margin-bottom: 1.25em;
    }

    a.site {
      font-style: normal;
      color: #8a4820;
      white-space: nowrap;
    }

    a.site:hover {
      color: #f09040;
    }

    .project-block {
      margin-bottom: 1.35em;
    }

    .type-cursor {
      display: inline-block;
      width: 2px;
      height: 1.05em;
      margin-left: 3px;
      vertical-align: -0.12em;
      background: #c87030;
      animation: cursor-blink 1.05s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .type-cursor {
        animation: none;
        opacity: 0.85;
      }
    }

    /* Chess */
    .chess-section {
      margin-top: 1.5em;
    }

    .chess-toggle {
      background: none;
      border: none;
      font: inherit;
      color: #8a4820;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0;
      letter-spacing: 0.02em;
      font-size: 15px;
      transition: color 0.15s ease;
      text-align: left;
    }

    .chess-toggle:hover,
    .chess-toggle:focus-visible {
      color: #dc8535;
      outline: none;
    }

    .chess-toggle:focus-visible {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .chess-knight {
      font-size: 22px;
      line-height: 1;
      color: #dc8535;
      font-style: normal;
      user-select: none;
    }

    .chess-panel {
      display: none;
      margin-top: 1.25em;
      overflow: hidden;
    }

    .chess-section.is-open .chess-panel {
      display: block;
      animation: chess-drop 0.28s ease-out;
    }

    @keyframes chess-drop {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #chess-board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: 100%;
      max-width: 400px;
      border: 1px solid #1c1c1c;
      user-select: none;
      cursor: pointer;
    }

    .sq {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 5vw, 28px);
      line-height: 1;
      position: relative;
    }

    .sq.light { background: #1e1208; }
    .sq.dark  { background: #0d0d0d; }
    .sq.selected { background: #6b3200 !important; }

    .sq.legal::after {
      content: '';
      position: absolute;
      width: 30%;
      height: 30%;
      border-radius: 50%;
      background: #dc8535;
      opacity: 0.55;
      pointer-events: none;
    }

    .sq.legal.has-piece::after {
      width: 92%;
      height: 92%;
      border-radius: 0;
      background: transparent;
      border: 2px solid #dc8535;
      opacity: 0.4;
    }

    #chess-status {
      margin-top: 0.7em;
      font-size: 13px;
      color: #8a4820;
      min-height: 1.4em;
    }

    #new-game-btn {
      font-style: normal;
      color: #8a4820;
      font-size: 13px;
      margin-top: 0.5em;
      display: inline-block;
    }

    #new-game-btn:hover {
      color: #dc8535;
    }

    @media (max-width: 560px) {
      body {
        padding-left: 28px;
        padding-right: 28px;
        padding-top: max(clamp(32px, calc(50vh - 220px), 160px), env(safe-area-inset-top, 0px));
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <header class="projects-top">
      <p class="projects-label">projects</p>
      <a href="/" class="home-link">[ home ]</a>
    </header>
    <div class="project-block">
      <p><span class="name">YN Capital</span> — student-led angel syndicate for AI startups; co-built the site, CRM, and investor flow. <a href="https://yncapital.co" target="_blank" rel="noopener noreferrer" class="site">[ yncapital.co ]</a></p>
    </div>
    <div class="project-block">
      <p><span class="name">DrawnUp</span> — turns anything you imagine into a buildable plan; now scaling and marketing it. <a href="https://drawnup.io" target="_blank" rel="noopener noreferrer" class="site">[ drawnup.io ]</a></p>
    </div>
    <div class="project-block">
      <p>more to come soon.<span class="type-cursor" aria-hidden="true"></span></p>
    </div>

    <!-- Chess -->
    <div class="chess-section" id="chess-section">
      <button type="button" class="chess-toggle" id="chess-toggle" aria-expanded="false" aria-controls="chess-panel">
        <span>play me in chess ?</span>
        <span class="chess-knight" aria-hidden="true">♘</span>
      </button>
      <div class="chess-panel" id="chess-panel">
        <div id="chess-board"></div>
        <p id="chess-status"></p>
        <a href="#" id="new-game-btn">[ new game ]</a>
      </div>
    </div>
  </div>

  <script src="/js/typewriter.js"></script>
  <script>
    function initPortfolioChess() {
    const UNICODE = {
      wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙',
      bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟'
    };

    const PIECE_VAL = { p:100, n:320, b:330, r:500, q:900, k:20000 };

    const PST = {
      p: [0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
      n: [-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
      b: [-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
      r: [0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],
      q: [-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],
      k: [-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20]
    };

    let game, selectedSq, legalTargets, isThinking;

    function evaluate() {
      let score = 0;
      const board = game.board();
      for (let r = 0; r < 8; r++) {
        for (let f = 0; f < 8; f++) {
          const p = board[r][f];
          if (!p) continue;
          const idx = r * 8 + f;
          const pstIdx = p.color === 'w' ? idx : 63 - idx;
          const val = PIECE_VAL[p.type] + (PST[p.type]?.[pstIdx] || 0);
          score += p.color === 'w' ? val : -val;
        }
      }
      return score;
    }

    function minimax(depth, alpha, beta, maximizing) {
      if (depth === 0 || game.game_over()) {
        if (game.in_checkmate()) return maximizing ? -50000 : 50000;
        return evaluate();
      }
      const moves = game.moves();
      moves.sort(() => Math.random() - 0.52); // slight shuffle for variety
      if (maximizing) {
        let best = -Infinity;
        for (const m of moves) {
          game.move(m);
          best = Math.max(best, minimax(depth - 1, alpha, beta, false));
          game.undo();
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      } else {
        let best = Infinity;
        for (const m of moves) {
          game.move(m);
          best = Math.min(best, minimax(depth - 1, alpha, beta, true));
          game.undo();
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
        return best;
      }
    }

    function getBotMove() {
      const moves = game.moves();
      if (!moves.length) return null;
      moves.sort(() => Math.random() - 0.5);
      let bestMove = null, bestVal = Infinity;
      for (const m of moves) {
        game.move(m);
        const val = minimax(2, -Infinity, Infinity, true);
        game.undo();
        if (val < bestVal) { bestVal = val; bestMove = m; }
      }
      return bestMove;
    }

    function renderBoard() {
      const el = document.getElementById('chess-board');
      el.innerHTML = '';
      const position = game.board();
      for (let r = 0; r < 8; r++) {
        for (let f = 0; f < 8; f++) {
          const sq = String.fromCharCode(97 + f) + (8 - r);
          const isLight = (r + f) % 2 === 0;
          const div = document.createElement('div');
          div.className = 'sq ' + (isLight ? 'light' : 'dark');
          div.dataset.sq = sq;

          const piece = position[r][f];
          if (piece) {
            const key = piece.color + piece.type.toUpperCase();
            div.textContent = UNICODE[key] || '';
            div.style.color = piece.color === 'w' ? '#e8d5a0' : '#c87030';
            div.classList.add('has-piece');
          }

          if (selectedSq === sq) div.classList.add('selected');
          if (legalTargets && legalTargets.includes(sq)) div.classList.add('legal');

          div.addEventListener('click', () => handleClick(sq));
          el.appendChild(div);
        }
      }
      updateStatus();
    }

    function handleClick(sq) {
      if (isThinking || game.turn() !== 'w' || game.game_over()) return;

      if (selectedSq) {
        if (legalTargets.includes(sq)) {
          const piece = game.get(selectedSq);
          const promotion = (piece && piece.type === 'p' && sq[1] === '8') ? 'q' : undefined;
          game.move({ from: selectedSq, to: sq, promotion });
          selectedSq = null;
          legalTargets = [];
          renderBoard();
          if (!game.game_over()) {
            isThinking = true;
            updateStatus();
            setTimeout(() => {
              const m = getBotMove();
              if (m) game.move(m);
              isThinking = false;
              renderBoard();
            }, 300);
          }
          return;
        }
        selectedSq = null;
        legalTargets = [];
      }

      const piece = game.get(sq);
      if (piece && piece.color === 'w') {
        selectedSq = sq;
        legalTargets = game.moves({ square: sq, verbose: true }).map(m => m.to);
      }
      renderBoard();
    }

    function updateStatus() {
      const el = document.getElementById('chess-status');
      if (isThinking) { el.textContent = 'thinking...'; return; }
      if (game.in_checkmate()) {
        el.textContent = game.turn() === 'w' ? 'checkmate. you lose.' : 'checkmate. you win.';
      } else if (game.in_draw()) {
        el.textContent = 'draw.';
      } else if (game.in_check()) {
        el.textContent = game.turn() === 'w' ? 'check — your move.' : 'check.';
      } else {
        el.textContent = game.turn() === 'w' ? 'your move.' : '';
      }
    }

    function newGame() {
      if (isThinking) return;
      game = new Chess();
      selectedSq = null;
      legalTargets = [];
      isThinking = false;
      renderBoard();
    }

    document.getElementById('new-game-btn').addEventListener('click', e => {
      e.preventDefault();
      newGame();
    });

    document.getElementById('chess-toggle').addEventListener('click', () => {
      const section = document.getElementById('chess-section');
      const btn = document.getElementById('chess-toggle');
      const open = !section.classList.contains('is-open');
      section.classList.toggle('is-open', open);
      btn.setAttribute('aria-expanded', open);
    });

    newGame();
    }
  </script>
  <script>
    (function () {
      /* v2 key: older hb_tw_projects could block animation if set from a broken load */
      var KEY = 'hb_tw_proj_v2';
      var root = document.querySelector('.content');
      var backup = root.innerHTML;
      function markDone() {
        try {
          sessionStorage.setItem(KEY, '1');
        } catch (e) {}
      }
      function skipTyping() {
        try {
          if (sessionStorage.getItem(KEY)) return true;
          if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
            try {
              sessionStorage.setItem(KEY, '1');
            } catch (e2) {}
            return true;
          }
        } catch (e) {
          return true;
        }
        return false;
      }
      if (skipTyping()) {
        initPortfolioChess();
        return;
      }
      if (typeof runProjectsTypewriter !== 'function') {
        initPortfolioChess();
        return;
      }
      try {
        root.innerHTML = '';
        runProjectsTypewriter(root)
          .then(function () {
            markDone();
            initPortfolioChess();
          })
          .catch(function () {
            root.innerHTML = backup;
            initPortfolioChess();
          });
      } catch (e) {
        root.innerHTML = backup;
        initPortfolioChess();
      }
    })();
  </script>
</body>
</html>
