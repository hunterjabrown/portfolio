<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Hunter Brown</title>
  <link rel="icon" type="image/png" href="/assets/HB%20(1).png">
  <style>
    html, body { margin: 0; background: #0d0d0d; height: 100%; }
    .bar {
      font-family: 'Courier New', Courier, monospace;
      padding: 12px 20px;
      border-bottom: 1px solid #1c1c1c;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .bar a {
      color: #8a4820;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    .bar a:hover { color: #dc8535; }
    iframe {
      width: 100%;
      height: calc(100vh - 49px);
      border: 0;
      display: block;
      background: #1a1a1a;
    }
  </style>
  <script>
    (function () {
      if (location.pathname === '/resume/') {
        history.replaceState(null, '', '/resume');
      }
    })();
  </script>
</head>
<body>
  <div class="bar">
    <a href="/">[ home ]</a>
    <a href="/Resume.pdf" download>download pdf</a>
  </div>
  <iframe src="/Resume.pdf" title="Resume"></iframe>
</body>
</html>
